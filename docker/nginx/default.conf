server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html bitrixsetup.php;

    # Блокируем прямой HTTP-доступ к папке с отчетами
    location ^~ /upload/reports/ {
        deny all;
    }

    # Основной роутинг для Битрикса
    location / {
        try_files $uri $uri/ /bitrix/routing_index.php$is_args$args;
    }

    # Обработка PHP файлов ядра Битрикса
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
		# --- ИЗМЕНЕНИЯ ЗДЕСЬ: Увеличиваем таймауты для долгой установки Битрикс 
		# при медленной записи на диск на локальном окружении, на сервере после тестов можно убрать ---
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_connect_timeout 600;
    }
}


